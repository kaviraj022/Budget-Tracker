<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="styles/loginStyles/signupStyles.css">
</head>
<body>
  <div class="container">
    <h1>Sign Up</h1>
    <form id="signup-form">
      <input type="email" id="signup-email" placeholder="Enter your email" required>
      <input type="password" id="signup-password" placeholder="Create a password" required>
      <input type="text" id="favorite-color" placeholder="Favorite color" required>
      <input type="text" id="dob" placeholder="Date of Birth (DDMMYYYY)" required>
      <button type="submit">Sign Up</button>
    </form>
    <p><a href="signin.html">Already have an account? Sign In</a></p>
  </div>

  <script src="globalScript.js"></script>
  <script>
    document.getElementById("signup-form").addEventListener("submit", function(event) {
      event.preventDefault();

      const email = document.getElementById("signup-email").value;
      const password = document.getElementById("signup-password").value;
      const favoriteColor = document.getElementById("favorite-color").value;
      const dob = document.getElementById("dob").value;

      // Store user data in localStorage
      localStorage.setItem("userEmail", email);
      localStorage.setItem("userPassword", password);
      localStorage.setItem("userFavoriteColor", favoriteColor);
      localStorage.setItem("userDOB", dob);  // Save DOB

      alert("Sign Up Successful!");
      window.location.href = "signin.html"; // Redirect to Sign In page
    });
  </script>
</body>
</html>
