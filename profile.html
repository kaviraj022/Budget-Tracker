<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="styles/globalStyles.css">
  <link rel="stylesheet" href="styles/profileStyles.css">
  <script src="globalScript.js"></script>
</head>
<body>
  <header>
    <div class="navbar">
      <a href="expenses.html">Expenses</a>
      <a href="income.html">Income</a>
      <a href="tranfer.html">Transfer</a>
      <a href="accounts.html">Accounts</a>
      <a href="profile.html" class="active">Profile</a>
    </div>
  </header>

  <div class="container">
    <h1>User Profile</h1>
    <p>Welcome, <strong id="user-name">User</strong></p>
    <p>Email: <span id="user-email">example@example.com</span></p>
    <button class="logout-btn" id="logout">Logout</button>
  </div>

  <footer>
    <p>&copy; 2024 MyExpenseTracker. All rights reserved.</p>
  </footer>

  <script>
    // Display user email from localStorage
    const userEmail = localStorage.getItem("userEmail");
    document.getElementById("user-email").textContent = userEmail;

    document.getElementById("logout").addEventListener("click", function () {
      localStorage.removeItem("loggedIn"); // Log out user
      window.location.href = "signin.html"; // Redirect to signin page after logout
    });
  </script>
</body>
</html>
