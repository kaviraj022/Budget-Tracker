<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Income</title>
  <link rel="stylesheet" href="styles/globalStyles.css">
  <link rel="stylesheet" href="styles/expenceStyles.css">
  <script src="globalScript.js"></script>
</head>
<body>
  <header>
    <div class="navbar">
      <a href="expenses.html">Expenses</a>
      <a href="income.html" class="active">Income</a>
      <a href="tranfer.html">Transfer</a>
      <a href="accounts.html">Accounts</a>
      <a href="profile.html">Profile</a>
    </div>
  </header>
 <div class="container">
    <form id="income-form">
        <label for="account">Account:</label>
        <select id="account-select"></select><br>

        <label for="amount">Amount:</label>
        <input type="number" id="amount" required><br>

        <label for="date">Date:</label>
        <input type="date" id="date" value=""><br>

        <button type="submit">Submit</button>
    </form>
</div>

  <footer>
    <p>&copy; 2024 MyExpenseTracker. All rights reserved.</p>
  </footer>

  <script>
    const accounts = JSON.parse(localStorage.getItem("accounts") || "[]");

    function loadAccountOptions() {
      const accountSelect = document.getElementById("account-select");
      accountSelect.innerHTML = "";
      accounts.forEach((account, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = account.name;
        accountSelect.appendChild(option);
      });
    }

    document.getElementById("income-form").addEventListener("submit", (event) => {
      event.preventDefault();
      const accountIndex = document.getElementById("account-select").value;
      const amount = parseFloat(document.getElementById("amount").value);
      const date = document.getElementById("date").value || new Date().toISOString().split('T')[0];

      if (isNaN(amount) || amount <= 0) {
        alert("Please enter a valid amount.");
        return;
      }

      accounts[accountIndex].amount += amount;
      localStorage.setItem("accounts", JSON.stringify(accounts));

      alert("Income recorded successfully!");

      window.location.href = "accounts.html";
    });

    loadAccountOptions();
  </script>
</body>
</html>
