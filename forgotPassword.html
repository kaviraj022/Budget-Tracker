<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="styles/loginStyles/forgotPasswordStyles.css">
</head>
<body>
  <div class="container">
    <h1>Forgot Password</h1>
    <form id="forgot-password-form">
      <input type="email" id="forgot-email" placeholder="Enter your email" required>
      <input type="text" id="dob" placeholder="Enter Date of Birth (DDMMYYYY)" required>
      <button type="submit">Reset Password</button>
    </form>
    <p><a href="signin.html">Back to Sign In</a></p>
  </div>

  <script src="globalScript.js"></script>
  <script>
    document.getElementById("forgot-password-form").addEventListener("submit", function(event) {
      event.preventDefault();
      
      const email = document.getElementById("forgot-email").value;
      const dob = document.getElementById("dob").value;

      const storedEmail = localStorage.getItem("userEmail");
      const storedDOB = localStorage.getItem("userDOB");

      // Verify email and DOB match the stored data
      if (email === storedEmail && dob === storedDOB) {
        // Simulate a password reset action (for simplicity)
        alert("Password reset link has been sent to " + email);
        window.location.href = "signin.html"; // Redirect to Sign In page
      } else {
        alert("Email or Date of Birth is incorrect. Please try again.");
      }
    });
  </script>
</body>
</html>
